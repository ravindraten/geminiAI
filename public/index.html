<!DOCTYPE html>
<html lang="en">
<head>
    <title>Gemini Search</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        input { padding: 10px; width: 300px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; cursor: pointer; background: #0070f3; color: white; border: none; border-radius: 4px; }
        #result { margin-top: 20px; max-width: 600px; line-height: 1.6; }
    </style>
</head>
<body>
    <h2>Gemini Search Bar</h2>
    <div>
        <input type="text" id="query" placeholder="Ask something...">
        <button onclick="search()">Search</button>
    </div>
    <div id="result"></div>

    <script>
        async function search() {
            const query = document.getElementById('query').value;
            const resultDiv = document.getElementById('result');
            resultDiv.innerText = "Thinking...";

            try {
                // We call our Vercel function, NOT the Gemini API directly
                const response = await fetch('/public/api/gemini', {
                    method: 'POST',
                    body: JSON.stringify({ prompt: query })
                });
                const data = await response.json();
                resultDiv.innerText = data.text || "No response.";
            } catch (err) {
                resultDiv.innerText = "Error connecting to the function.";
            }
        }
    </script>
</body>
</html>
